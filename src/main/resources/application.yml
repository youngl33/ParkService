server:
  port: 80

spring:
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_ADDRESS:127.0.0.1:3306}/${MYSQL_DATABASE:park}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:young}
    password: ${MYSQL_PASSWORD:park123}
  mvc:
    view:
      suffix: .html
      prefix: /
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

logging:
  level:
    root: INFO
    com.tencent.wxcloudrun: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

themepark:
  live:
    url-template: https://api.themeparks.wiki/v1/entity/%s/live
    entity-ids:
      - 6e1464ca-1e9b-49c3-8937-c5c6f6675057
